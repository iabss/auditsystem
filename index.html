<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit System - Production</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-animate {
            animation: modalFadeIn 0.2s ease-out forwards;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.294.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calendar, CheckCircle2, AlertCircle, Plus, Edit2, ChevronDown, Trash2, 
            FolderPlus, FileText, User, MapPin, Save, ArrowLeft, LayoutGrid, List, 
            BarChart3, TrendingUp, Activity, Filter, ExternalLink, RefreshCw, Sparkles, 
            Loader2, X, Zap, Cloud, Database, CalendarRange, Download, Upload,
            Layout, Users, PieChart, Settings, LogOut, Menu, Target, Clock, CheckSquare, 
            Square, AlertTriangle, Check, Link as LinkIcon, FileCheck, Timer, Send, Lock,
            Folder, FolderOpen, MoreVertical
        } from 'lucide-react';

        // --- FIREBASE IMPORTS ---
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from 'firebase/auth';
        import { getFirestore, doc, setDoc, onSnapshot } from 'firebase/firestore';

        const LOGO_URL = "logo.jpeg"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCUHUzzVlUb6TJeybRF-BPVlZhpD51yFOo",
            authDomain: "audit-program.firebaseapp.com",
            projectId: "audit-program",
            storageBucket: "audit-program.firebasestorage.app",
            messagingSenderId: "993068320680",
            appId: "1:993068320680:web:6055c11b25dff59716bf9d",
            measurementId: "G-33B0YBVD0X"
        };

        // --- DATA DEFAULT ---
        const DEFAULT_ACCURACY_FOLDERS = [
            { id: 'af1', name: 'Audit Operasional' },
            { id: 'af2', name: 'Audit Management System' }
        ];

        const DEFAULT_PROGRAMS = [
            {
                id: 1,
                title: 'Audit Program IT Operasional', 
                pic: 'Habibie', 
                site: 'AGM', 
                docLink: '', 
                finalReport: null,
                activities: [
                    { id: 1, activity: 'Desk Audit', start: '2024-09-01', end: '2024-09-05', actualStart: '2024-09-01', actualEnd: '2024-09-05', actualDays: 5, link: '' },
                    { id: 2, activity: 'Opening Meeting', start: '2024-09-06', end: '2024-09-06', actualStart: '2024-09-06', actualEnd: '2024-09-06', actualDays: 1, link: '' },
                    { id: 3, activity: 'Pelaksanaan Audit', start: '2024-09-07', end: '2024-09-18', actualStart: '2024-09-07', actualEnd: '2024-09-18', actualDays: 12, link: '' },
                    { id: 4, activity: 'Closing Meeting', start: '2024-09-19', end: '2024-09-19', actualStart: '2024-09-19', actualEnd: '2024-09-19', actualDays: 1, link: '' },
                    { id: 5, activity: 'Submit LHA', start: '2024-09-20', end: '2024-09-25', actualStart: '2024-09-20', actualEnd: '2024-09-23', actualDays: 4, link: '' },
                ]
            }
        ];

        const DEFAULT_ACCURACY_DATA = [
            { id: 1, folderId: 'af1', projectName: 'Audit Closing Project AGM', site: 'AGM', planStart: '2024-01-01', completed: true, evidence: '' },
            { id: 2, folderId: 'af1', projectName: 'Audit Closing Project MAS', site: 'MAS', planStart: '2024-01-01', completed: true, evidence: '' },
            { id: 8, folderId: 'af2', projectName: 'Audit ISO 9001 Stage 1', site: 'HO', planStart: '2024-11-01', completed: false, evidence: '' },
        ];

        // --- LOGIN SCREEN COMPONENT ---
        const LoginScreen = () => {
            const [isRegister, setIsRegister] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                const auth = getAuth();
                try {
                    if (isRegister) await createUserWithEmailAndPassword(auth, email, password);
                    else await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setError(err.message);
                } finally { setLoading(false); }
            };

            const handleGoogleLogin = async () => {
                const auth = getAuth();
                const provider = new GoogleAuthProvider();
                try { await signInWithPopup(auth, provider); } catch (err) { setError(err.message); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
                        <div className="flex justify-center mb-6">
                            <div className="h-24 flex items-center justify-center">
                                <img src={LOGO_URL} alt="Logo" className="max-h-full object-contain" onError={(e) => {e.target.style.display='none';}}/>
                            </div>
                        </div>
                        <h2 className="text-2xl font-bold text-center text-slate-800 mb-6">Audit System</h2>
                        <button onClick={handleGoogleLogin} className="w-full bg-white border border-slate-300 text-slate-700 font-bold py-2.5 rounded-lg hover:bg-slate-50 transition flex justify-center items-center gap-2 mb-4">
                            <svg className="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Masuk dengan Google
                        </button>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)} className="w-full px-4 py-2 border rounded-lg" placeholder="Email"/>
                            <input type="password" required value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-2 border rounded-lg" placeholder="Password"/>
                            {error && <div className="text-rose-500 text-sm">{error}</div>}
                            <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white font-bold py-2.5 rounded-lg">{loading ? '...' : (isRegister ? 'Daftar' : 'Masuk')}</button>
                        </form>
                        <button onClick={() => setIsRegister(!isRegister)} className="w-full text-center text-sm text-blue-600 mt-4">{isRegister ? "Sudah punya akun? Login" : "Belum punya akun? Daftar"}</button>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const AuditApp = () => {
            const [user, setUser] = useState(null);
            const [authInitialized, setAuthInitialized] = useState(false);
            const [activeMenu, setActiveMenu] = useState('audit'); 
            const [isSidebarOpen, setSidebarOpen] = useState(true);
            const [view, setView] = useState('dashboard'); 
            const [dashboardLayout, setDashboardLayout] = useState('grid');
            const [programs, setPrograms] = useState([]);
            const [accuracyData, setAccuracyData] = useState([]);
            const [accuracyFolders, setAccuracyFolders] = useState([]);
            const [isDataLoaded, setIsDataLoaded] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [currentProgramId, setCurrentProgramId] = useState(null);
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, type: null, payload: null, title: '', message: '', confirmLabel: '' });

            const programsRef = useRef([]);
            const accuracyRef = useRef([]);
            const accuracyFoldersRef = useRef([]);
            const fileInputRef = useRef(null);

            const GLOBAL_CUT_OFF = '2099-12-31';
            const ADMIN_EMAILS = ["taultmajid5@gmail.com", "admin@perusahaan.com"];
            const isUserAdmin = () => user && ADMIN_EMAILS.includes(user.email);

            useEffect(() => { programsRef.current = programs; }, [programs]);
            useEffect(() => { accuracyRef.current = accuracyData; }, [accuracyData]);
            useEffect(() => { accuracyFoldersRef.current = accuracyFolders; }, [accuracyFolders]);

            // Firebase Init
            useEffect(() => {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                return onAuthStateChanged(auth, (u) => { setUser(u); setAuthInitialized(true); });
            }, []);

            // --- DATA SINKRONISASI (FIXED docRef) ---
            useEffect(() => {
                if (!user) return;
                const db = getFirestore();
                const docRef = doc(db, 'audit_data', 'shared_board'); // Path Stabil

                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        // Hanya timpa state jika data di server memang ada isinya
                        if (data.programs && data.programs.length > 0) {
                            setPrograms(data.programs);
                            setAccuracyData(data.accuracyData || []);
                            setAccuracyFolders(data.accuracyFolders || []);
                        }
                        setIsDataLoaded(true);
                    } else {
                        setPrograms(DEFAULT_PROGRAMS);
                        setAccuracyData(DEFAULT_ACCURACY_DATA);
                        setAccuracyFolders(DEFAULT_ACCURACY_FOLDERS);
                        setIsDataLoaded(true);
                    }
                }, (err) => console.error("Sync error:", err));

                return () => unsubscribe();
            }, [user]);

            // --- AUTO SAVE (FIXED docRef + SAFETY GUARD) ---
            useEffect(() => {
                // Jangan simpan jika data belum siap, atau jika isinya masih template default (mencegah overwriting)
                const isStillTemplate = programs.length === 1 && programs[0].title === 'Audit Program IT Operasional';
                if (!isDataLoaded || !user || isStillTemplate) return;

                const saveData = async () => {
                    setIsSaving(true);
                    try {
                        const db = getFirestore();
                        const docRef = doc(db, 'audit_data', 'shared_board');
                        await setDoc(docRef, { 
                            programs: programsRef.current, 
                            accuracyData: accuracyRef.current, 
                            accuracyFolders: accuracyFoldersRef.current,
                            lastUpdate: new Date().toISOString()
                        }, { merge: true });
                        setTimeout(() => setIsSaving(false), 1000);
                    } catch (e) { console.error("Save error:", e); setIsSaving(false); }
                };

                const timer = setTimeout(saveData, 3000);
                return () => clearTimeout(timer);
            }, [programs, accuracyData, accuracyFolders, isDataLoaded, user]);

            // Helper Functions
            const getDaysDiff = (start, end) => {
                if (!start || !end) return 0;
                const d1 = new Date(start); const d2 = new Date(end);
                return Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
            };
            const fmt = (n) => n ? n.toFixed(1) : "0.0";
            
            const calculateMetrics = (activities, targetDate) => {
                if (!activities || activities.length === 0) return { plannedDays: 0, actualDays: 0, achievement: 0, overdueCount: 0 };
                let totalP = 0, totalA = 0, overdue = 0;
                activities.forEach(item => {
                    const dur = getDaysDiff(item.start, item.end);
                    totalP += dur;
                    totalA += (item.actualDays || 0);
                    if (item.actualDays > dur) overdue += (item.actualDays - dur);
                });
                return { plannedDays: totalP, actualDays: totalA, achievement: totalA > 0 ? (totalP / totalA) * 100 : 0, overdueCount: overdue };
            };

            const handleLogout = () => signOut(getAuth());
            const handleOpenDetail = (id) => { setCurrentProgramId(id); setView('detail'); };

            // Renderers...
            const renderAuditModule = () => {
                if (view === 'dashboard') return (
                    <div className="p-8">
                        <div className="flex justify-between items-center mb-8">
                            <div><h1 className="text-3xl font-bold">Audit Dashboard</h1><p className="text-slate-500">Real-time sync enabled</p></div>
                            <div className="flex gap-2">
                                <div className={`px-3 py-1.5 rounded text-xs font-bold ${isSaving ? 'bg-orange-100 text-orange-600' : 'bg-emerald-100 text-emerald-600'}`}>{isSaving ? 'Syncing...' : 'Saved to Cloud'}</div>
                                <button onClick={() => {
                                    const newId = Date.now();
                                    const newProg = { ...DEFAULT_PROGRAMS[0], id: newId, title: "New Project " + (programs.length + 1) };
                                    setPrograms([newProg, ...programs]);
                                    setCurrentProgramId(newId);
                                    setView('detail');
                                }} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+ New Audit</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {programs.map(p => {
                                const m = calculateMetrics(p.activities, GLOBAL_CUT_OFF);
                                return (
                                    <div key={p.id} onClick={() => handleOpenDetail(p.id)} className="bg-white p-6 rounded-xl border shadow-sm hover:shadow-md cursor-pointer transition relative">
                                        <h3 className="font-bold text-lg mb-4">{p.title}</h3>
                                        <div className="flex justify-between text-sm text-slate-500 mb-4"><span>PIC: {p.pic}</span><span>Site: {p.site}</span></div>
                                        <div className="bg-slate-50 p-4 rounded-lg grid grid-cols-3 text-center mb-4">
                                            <div><div className="text-[10px] uppercase text-slate-400">Plan</div><div className="font-bold">{m.plannedDays}d</div></div>
                                            <div><div className="text-[10px] uppercase text-slate-400">Act</div><div className="font-bold">{m.actualDays}d</div></div>
                                            <div><div className="text-[10px] uppercase text-slate-400">Score</div><div className="font-bold text-blue-600">{fmt(m.achievement)}%</div></div>
                                        </div>
                                        {m.overdueCount > 0 && <div className="text-xs text-rose-500 font-bold">⚠️ Delay: {m.overdueCount} Days</div>}
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                );

                const program = programs.find(p => p.id === currentProgramId);
                if (!program) return <div>Loading...</div>;

                return (
                    <div className="p-8">
                        <button onClick={() => setView('dashboard')} className="flex items-center gap-2 text-slate-500 mb-6 hover:text-blue-600"><ArrowLeft size={18}/> Back to Dashboard</button>
                        <div className="bg-white p-6 rounded-xl border mb-8">
                            <input value={program.title} onChange={(e) => setPrograms(programs.map(p => p.id === currentProgramId ? {...p, title: e.target.value} : p))} className="text-2xl font-bold border-b w-full outline-none focus:border-blue-500 mb-4"/>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-xs font-bold text-slate-400 uppercase">PIC</label><input value={program.pic} onChange={(e) => setPrograms(programs.map(p => p.id === currentProgramId ? {...p, pic: e.target.value} : p))} className="w-full border p-2 rounded mt-1"/></div>
                                <div><label className="text-xs font-bold text-slate-400 uppercase">Site</label><input value={program.site} onChange={(e) => setPrograms(programs.map(p => p.id === currentProgramId ? {...p, site: e.target.value} : p))} className="w-full border p-2 rounded mt-1"/></div>
                            </div>
                        </div>
                        <div className="bg-white rounded-xl border overflow-hidden">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr><th className="p-4">Activity</th><th className="p-4">Plan Start</th><th className="p-4">Plan End</th><th className="p-4">Actual Start</th><th className="p-4">Actual End</th><th className="p-4 text-center">Score</th></tr>
                                </thead>
                                <tbody className="divide-y">
                                    {program.activities.map(act => {
                                        const dur = getDaysDiff(act.start, act.end);
                                        const score = act.actualDays > 0 ? (dur / act.actualDays) * 100 : 0;
                                        return (
                                            <tr key={act.id}>
                                                <td className="p-4"><input value={act.activity} className="w-full bg-transparent"/></td>
                                                <td className="p-4"><input type="date" value={act.start} className="bg-transparent"/></td>
                                                <td className="p-4"><input type="date" value={act.end} className="bg-transparent"/></td>
                                                <td className="p-4"><input type="date" value={act.actualStart} className="bg-transparent"/></td>
                                                <td className="p-4"><input type="date" value={act.actualEnd} onChange={(e) => {
                                                    const updatedActs = program.activities.map(a => {
                                                        if (a.id === act.id) {
                                                            const newEnd = e.target.value;
                                                            return {...a, actualEnd: newEnd, actualDays: getDaysDiff(a.actualStart, newEnd)};
                                                        }
                                                        return a;
                                                    });
                                                    setPrograms(programs.map(p => p.id === currentProgramId ? {...p, activities: updatedActs} : p));
                                                }} className="bg-transparent font-bold text-blue-600"/></td>
                                                <td className="p-4 text-center font-bold">{fmt(score)}%</td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            if (!authInitialized) return <div className="h-screen flex items-center justify-center"><Loader2 className="animate-spin" size={32}/></div>;
            if (!user) return <LoginScreen />;

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col p-4">
                        <div className="font-bold text-white text-xl mb-8 flex items-center gap-2"><Layout size={24}/> AuditPro</div>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setActiveMenu('audit')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg ${activeMenu === 'audit' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}><FileText size={20}/> Audit Program</button>
                            <button onClick={() => setActiveMenu('settings')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg ${activeMenu === 'settings' ? 'bg-slate-700 text-white' : 'hover:bg-slate-800'}`}><Settings size={20}/> Settings</button>
                        </nav>
                        <div className="pt-4 border-t border-slate-800 flex items-center justify-between">
                            <div className="text-sm truncate">{user.email}</div>
                            <button onClick={handleLogout}><LogOut size={18}/></button>
                        </div>
                    </aside>
                    <main className="flex-1 overflow-y-auto">
                        {activeMenu === 'audit' ? renderAuditModule() : (
                            <div className="p-8 text-center">
                                <h1 className="text-2xl font-bold mb-4">Settings</h1>
                                <p className="mb-4">Database: Cloud Firestore (audit_data/shared_board)</p>
                                <button onClick={handleLogout} className="bg-rose-600 text-white px-6 py-2 rounded-lg font-bold">Logout</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<AuditApp />);
    </script>
</body>
</html>
